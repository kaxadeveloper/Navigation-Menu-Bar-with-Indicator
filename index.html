<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Menu Bar with Indicator</title>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <ul class="nav-content">
            <li class="nav-list">
                <a href="#" class="link-item active">
                    <i class="bx bx-home link-icon"></i>
                    <span class="link-text">Home</span>
                </a>
            </li>
            <li class="nav-list">
                <a href="#" class="link-item">
                    <i class="bx bx-caret-right-square link-icon"></i>
                    <span class="link-text">Content</span>
                </a>
            </li>
            <li class="nav-list">
                <a href="#" class="link-item">
                    <i class="bx bx-bar-chart-big link-icon"></i>
                    <span class="link-text">Analytics</span>
                </a>
            </li>
            <li class="nav-list">
                <a href="#" class="link-item">
                    <i class="bx bx-message-bubble-reply link-icon"></i>
                    <span class="link-text">Comments</span>
                </a>
            </li>
            <li class="nav-list">
                <a href="#" class="link-item">
                    <i class="bx bx-user link-icon"></i>
                    <span class="link-text">Profile</span>
                </a>
            </li>

            <span class="indicator"></span>
        </ul>
    </nav>

    <script src="app.js"></script>
</body>
</html>
